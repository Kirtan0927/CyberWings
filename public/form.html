<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Membership Registration - Cybersecurity Community</title>
   <link rel="stylesheet" href="form.css" />
</head>
<body>
  <main class="container" role="main" aria-label="Membership Registration Form">
    <h1>Membership Registration</h1>
    <p class="description">
      Fill out the form below to join our cybersecurity community. All fields marked with <span aria-label="required">*</span> are required.
    </p>

    <form>
      <!-- Personal Information -->
      <section aria-labelledby="personal-info-title" class="form-section">
        <h2 id="personal-info-title" class="section-title">Personal Information</h2>

        <div class="form-group">
          <label for="fullName">
            Full Name <span class="required" aria-hidden="true">*</span>
          </label>
          <input
            type="text"
            id="fullName"
            name="fullName"
            placeholder="Enter your full name"
            autocomplete="name"
            required
          />
        </div>

        <div class="form-group">
          <label for="emailAddress">
            Email Address <span class="required" aria-hidden="true">*</span>
          </label>
          <input
            type="email"
            id="emailAddress"
            name="emailAddress"
            placeholder="your.email@example.com"
            autocomplete="email"
            required
          />
        </div>

        <div class="form-group">
          <label for="studentId">
            Student ID <span class="required" aria-hidden="true">*</span>
          </label>
          <input
            type="text"
            id="studentId"
            name="studentId"
            placeholder="Enter your student ID"
            required
          />
        </div>
        <div class="form-group">
          <label for="academicYear">
            Academic Year <span class="required" aria-hidden="true">*</span>
          </label>
          <select id="academicYear" name="academicYear" required>
            <option value="" disabled selected hidden>Select your academic year</option>
            <option value="freshman">Freshman</option>
            <option value="sophomore">Sophomore</option>
            <option value="junior">Junior</option>
            <option value="senior">Senior</option>
            <option value="graduate">Graduate</option>
          </select>
        </div>

        <div class="form-group">
          <label for="major">
            Major <span class="required" aria-hidden="true">*</span>
          </label>
          <input
            type="text"
            id="major"
            name="major"
            placeholder="e.g., Computer Science, Information Technology"
            required
          />
        </div>
        <div class="form-group">
          <label for="experienceLevel">Cybersecurity Experience Level</label>
          <select id="experienceLevel" name="experienceLevel" >
            <option value="" disabled selected hidden>Select your experience level</option>
            <option value="beginner">Beginner</option>
            <option value="intermediate">Intermediate</option>
            <option value="advanced">Advanced</option>
            <option value="expert">Expert</option>
          </select>
        </div>

        <div class="form-group">
          <label for="areasInterest">Areas of Interest</label>
          <textarea
            id="areasInterest"
            name="areasInterest"
            placeholder="e.g., Penetration Testing, Digital Forensics, Network Security, Malware Analysis..."
            rows="3"
          ></textarea>
        </div>

        <div class="form-group">
          <label for="motivation">
            Why do you want to join The Cyber Wings?
          </label>
          <textarea
            id="motivation"
            name="motivation"
            placeholder="Tell us what motivates you to join our cybersecurity community..."
            rows="3"
          ></textarea>
        </div>
      </section>

      <button type="submit">Join The Cyber Wings</button>
    </form>
  </main>
</body>
</html>


<script>
document.querySelector('form').addEventListener('submit', async function(e) {
  e.preventDefault();
  const btn = this.querySelector('button[type="submit"]');
  const orig = btn.textContent;
  btn.disabled = true;
  btn.textContent = 'Submitting...';

  // Capitalise first letter of academic_year value to match DB enum
  const ay = document.getElementById('academicYear').value;
  const academic_year = ay ? ay.charAt(0).toUpperCase() + ay.slice(1) : '';

  const exp = document.getElementById('experienceLevel').value;
  const experience = exp ? exp.charAt(0).toUpperCase() + exp.slice(1) : 'Beginner';

  const body = {
    fullname:      document.getElementById('fullName').value.trim(),
    email:         document.getElementById('emailAddress').value.trim(),
    student_id:    document.getElementById('studentId').value.trim(),
    academic_year,
    major:         document.getElementById('major').value.trim(),
    experience,
    interests:     document.getElementById('areasInterest').value.trim(),
    motivation:    document.getElementById('motivation').value.trim(),
  };

  try {
    const res  = await fetch('/api/members/register', {
      method:  'POST',
      headers: { 'Content-Type': 'application/json' },
      body:    JSON.stringify(body),
    });
    const data = await res.json();
    if (data.success) {
      showMsg(data.message, true);
      this.reset();
    } else {
      const msg = data.errors ? data.errors.map(e => e.msg).join(' | ') : data.message;
      showMsg(msg, false);
    }
  } catch {
    showMsg('Network error. Please check your connection.', false);
  } finally {
    btn.disabled = false;
    btn.textContent = orig;
  }
});

function showMsg(text, ok) {
  let el = document.getElementById('_formMsg');
  if (!el) {
    el = document.createElement('div');
    el.id = '_formMsg';
    el.style.cssText = 'margin-top:16px;padding:12px 16px;border-radius:6px;font-size:14px;text-align:center;';
    document.querySelector('form').after(el);
  }
  el.style.background = ok ? 'rgba(0,230,118,0.1)' : 'rgba(255,82,82,0.1)';
  el.style.border = `1px solid ${ok ? '#00e676' : '#ff5252'}`;
  el.style.color  = ok ? '#00e676' : '#ff5252';
  el.textContent  = text;
  el.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
}
</script>
