<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Admin Login — The Cyber Wings</title>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --cyan: #00d8ff;
      --cyan-dim: rgba(0,216,255,0.15);
      --cyan-glow: rgba(0,216,255,0.5);
      --bg: #020b10;
      --surface: #070f16;
      --border: #0d2535;
      --text: #8da8b8;
      --text-bright: #c8dde8;
      --red: #ff4455;
      --green: #00ff88;
    }

    body {
      font-family: 'JetBrains Mono', monospace;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }

    /* Animated grid background */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(0,216,255,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,216,255,0.03) 1px, transparent 1px);
      background-size: 40px 40px;
      animation: gridMove 20s linear infinite;
      pointer-events: none;
    }

    @keyframes gridMove {
      0% { transform: translateY(0); }
      100% { transform: translateY(40px); }
    }

    /* Scanline overlay */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 2px,
        rgba(0,0,0,0.1) 2px,
        rgba(0,0,0,0.1) 4px
      );
      pointer-events: none;
      z-index: 0;
    }

    .login-wrap {
      position: relative;
      z-index: 10;
      width: 100%;
      max-width: 420px;
      padding: 16px;
    }

    /* Logo */
    .logo-row {
      display: flex;
      align-items: center;
      gap: 12px;
      justify-content: center;
      margin-bottom: 32px;
    }
    .logo-row img { width: 44px; height: 44px; filter: drop-shadow(0 0 10px var(--cyan)); }
    .logo-text {
      font-family: 'Rajdhani', sans-serif;
      font-size: 22px;
      font-weight: 700;
      background: linear-gradient(90deg, var(--cyan), #5b8fff, #b86fff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      letter-spacing: 2px;
    }

    /* Card */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 36px 32px;
      box-shadow: 0 0 60px rgba(0,216,255,0.05), inset 0 1px 0 rgba(0,216,255,0.06);
      position: relative;
      overflow: hidden;
    }

    /* Corner accents */
    .card::before, .card::after {
      content: '';
      position: absolute;
      width: 20px;
      height: 20px;
      border-color: var(--cyan);
      border-style: solid;
    }
    .card::before { top: 12px; left: 12px; border-width: 2px 0 0 2px; }
    .card::after  { bottom: 12px; right: 12px; border-width: 0 2px 2px 0; }

    .card-header { margin-bottom: 28px; }
    .card-label {
      font-size: 10px;
      letter-spacing: 4px;
      color: var(--cyan);
      margin-bottom: 8px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .card-label::before {
      content: '';
      display: inline-block;
      width: 20px;
      height: 1px;
      background: var(--cyan);
    }
    .card-title {
      font-family: 'Rajdhani', sans-serif;
      font-size: 26px;
      font-weight: 700;
      color: var(--text-bright);
      letter-spacing: 1px;
    }

    /* Form */
    .field { margin-bottom: 20px; }
    label {
      display: block;
      font-size: 10px;
      letter-spacing: 2px;
      color: var(--cyan);
      margin-bottom: 8px;
      text-transform: uppercase;
    }
    .input-wrap { position: relative; }
    .input-wrap svg {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text);
      width: 15px;
      height: 15px;
    }
    input {
      width: 100%;
      background: rgba(0,0,0,0.4);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 11px 14px 11px 40px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 13px;
      color: var(--text-bright);
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    input:focus {
      border-color: var(--cyan);
      box-shadow: 0 0 0 3px var(--cyan-dim);
    }
    input::placeholder { color: #2a4455; }

    /* Submit button */
    .btn {
      width: 100%;
      padding: 13px;
      background: transparent;
      border: 1px solid var(--cyan);
      border-radius: 6px;
      color: var(--cyan);
      font-family: 'JetBrains Mono', monospace;
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 2px;
      cursor: pointer;
      position: relative;
      overflow: hidden;
      transition: color 0.25s, box-shadow 0.25s;
      margin-top: 8px;
    }
    .btn::before {
      content: '';
      position: absolute;
      inset: 0;
      background: var(--cyan);
      transform: scaleX(0);
      transform-origin: left;
      transition: transform 0.25s ease;
      z-index: 0;
    }
    .btn:hover::before { transform: scaleX(1); }
    .btn:hover { color: #000; box-shadow: 0 0 20px var(--cyan-glow); }
    .btn span { position: relative; z-index: 1; }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }

    /* Error/success */
    .alert {
      padding: 10px 14px;
      border-radius: 6px;
      font-size: 12px;
      margin-bottom: 18px;
      display: none;
    }
    .alert.error   { background: rgba(255,68,85,0.1); border: 1px solid #ff4455; color: #ff8899; }
    .alert.success { background: rgba(0,255,136,0.08); border: 1px solid #00ff88; color: #00ff88; }
    .alert.show { display: block; }

    /* Bottom note */
    .back-link {
      display: block;
      text-align: center;
      margin-top: 22px;
      font-size: 11px;
      color: var(--text);
      text-decoration: none;
      letter-spacing: 1px;
      transition: color 0.2s;
    }
    .back-link:hover { color: var(--cyan); }

    /* Blinking cursor */
    .cursor { display: inline-block; animation: blink 1s step-end infinite; }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }
  </style>
</head>
<body>

<div class="login-wrap">
  <div class="logo-row">
    <img src="/images/logo.png" alt="The Cyber Wings logo" onerror="this.style.display='none'"/>
    <span class="logo-text">THECYBERWINGS</span>
  </div>

  <div class="card">
    <div class="card-header">
      <p class="card-label">SYSTEM ACCESS</p>
      <h1 class="card-title">Admin Login<span class="cursor">_</span></h1>
    </div>

    <div class="alert" id="alertBox"></div>

    <form id="loginForm" autocomplete="off">
      <div class="field">
        <label for="username">Username</label>
        <div class="input-wrap">
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/>
          </svg>
          <input id="username" name="username" type="text" placeholder="admin" required autocomplete="username"/>
        </div>
      </div>

      <div class="field">
        <label for="password">Password</label>
        <div class="input-wrap">
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/>
          </svg>
          <input id="password" name="password" type="password" placeholder="••••••••••" required autocomplete="current-password"/>
        </div>
      </div>

      <button class="btn" type="submit" id="submitBtn">
        <span id="btnText">AUTHENTICATE</span>
      </button>
    </form>

    <a class="back-link" href="/">← Back to website</a>
  </div>
</div>

<script>
  const form     = document.getElementById('loginForm');
  const alertBox = document.getElementById('alertBox');
  const submitBtn = document.getElementById('submitBtn');
  const btnText  = document.getElementById('btnText');

  function showAlert(msg, type) {
    alertBox.textContent = msg;
    alertBox.className = `alert ${type} show`;
  }

  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    alertBox.className = 'alert';
    submitBtn.disabled = true;
    btnText.textContent = 'AUTHENTICATING...';

    try {
      const res  = await fetch('/api/admin/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          username: document.getElementById('username').value.trim(),
          password: document.getElementById('password').value,
        }),
      });
      const data = await res.json();

      if (data.success) {
        showAlert('Access granted. Redirecting...', 'success');
        setTimeout(() => window.location.href = '/admin', 800);
      } else {
        showAlert(data.message || 'Authentication failed.', 'error');
        submitBtn.disabled = false;
        btnText.textContent = 'AUTHENTICATE';
      }
    } catch {
      showAlert('Connection error. Is the server running?', 'error');
      submitBtn.disabled = false;
      btnText.textContent = 'AUTHENTICATE';
    }
  });
</script>
</body>
</html>
